{% extends "!layout.html" %}

{% block sidebartitle %}
  {{ super() }}
  {% set ns = namespace(prefix='') %}
  {% for _ in range(pagename.count('/')) %}
    {% set ns.prefix = ns.prefix + '../' %}
  {% endfor %}
  <div class="lang-switcher">
    {% if doc_lang == "zh" %}
      <a href="{{ ns.prefix }}en/{{ pagename }}.html" hreflang="en">English</a>
    {% else %}
      <a href="{{ ns.prefix }}../{{ pagename }}.html" hreflang="zh-CN">中文</a>
    {% endif %}
  </div>
{% endblock %}
